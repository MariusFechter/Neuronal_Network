        // 1. Eindeutige Event-ID für die Deduplikation generieren
        const uniqueEventId = 'nn_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        const currentUrl = window.location.href;

        // 2. Browser-Pixel sofort initialisieren und feuern
        fbq('init', '1988847275335071');
        fbq('track', 'PageView', {}, { eventID: uniqueEventId });
        fbq('track', 'ViewContent', {
            content_name: 'Neuropsychologische Analyse',
            content_category: 'Analyse-Freischaltung',
            value: 15.00,
            currency: 'EUR'
        }, { eventID: uniqueEventId });

        // 3. Sichere Server-Side CAPI-Übertragung (Asynchron & Performance-schonend)
        function sendToServerSideCapi(eventName) {
            fetch('https://meta-capi-bridge.theneuronalnetwork.workers.dev', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    eventName: eventName,
                    eventId: uniqueEventId,
                    url: currentUrl
                }),
                mode: 'cors'
            })
            .then(response => response.json())
            .then(data => console.log('CAPI Transmit Success:', data))
            .catch(error => console.error('CAPI Transmit Error:', error));
        }

        // Erst feuern, wenn der Browser im Leerlauf (idle) ist, um Ladezeit nicht zu blockieren
        if ('requestIdleCallback' in window) {
            requestIdleCallback(() => sendToServerSideCapi('ViewContent'));
        } else {
            setTimeout(() => sendToServerSideCapi('ViewContent'), 1000);
        }
    </script>
