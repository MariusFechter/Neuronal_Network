<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROLAB | Neuronal Network</title>
    <!-- Modern, blocky, high-end geometric sans-serif font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #F5F5F5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 24px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        /* High-end blocky title forced onto a single line */
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 4vw; /* Fluid typography so it scales perfectly on all screens */
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: #ff7517;
            line-height: 1.0;
            white-space: nowrap; /* Forces text to stay on a single line */
        }

        /* Responsive adjustments for mobile viewports */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem; /* Scaled down for mobile to prevent overflow */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NEUROLAB | NEURONAL NETWORK</h1>
    </div>

</body>
</html>
