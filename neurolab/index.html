<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROLAB | Neuronal Network</title>
    <!-- Standard Clean Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #F5F5F5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-x: hidden;
            padding: 60px 24px 60px 24px;
        }

        .header-container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 50px; /* Platz zwischen Header und Kachel */
        }

        /* Header Titel */
        h1 {
            font-size: 3.5vw;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #ff7517;
            line-height: 1.2;
            white-space: nowrap;
        }

        /* Header Subline */
        p.subline {
            font-size: 1.5vw;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #d9d9d9;
            text-transform: uppercase;
            margin-top: 12px;
            white-space: nowrap;
        }

        /* --- APP-STORE STYLE PRODUCT CARD --- */
        .product-card {
            background-color: #080808; /* Minimal helleres Schwarz für Tiefe */
            border: 1px solid #161616; /* Edle, dezente Abgrenzung */
            border-radius: 24px; /* Weiche, moderne Ecken wie im App Store */
            width: 100%;
            max-width: 380px; /* Perfekte Kachelbreite */
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
            margin-top: 20px;
        }

        /* Hover-Effekt: Kachel hebt sich edel ab */
        .product-card:hover {
            transform: translateY(-4px);
            border-color: #262626;
            box-shadow: 0 12px 30px rgba(255, 117, 23, 0.04); /* Ganz dezenter oranger Schein */
        }

        /* Bild-Container */
        .card-image-wrapper {
            width: 100%;
            padding-top: 135%; /* Optimales Seitenverhältnis für das Cover */
            position: relative;
            background-color: #030303;
        }

        .card-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: scale 0.5s ease;
        }

        .product-card:hover .card-image {
            scale: 1.02; /* Sanfter Zoom-Effekt beim Hover */
        }

        /* Content-Bereich unter dem Bild */
        .card-content {
            padding: 24px;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #ff7517; /* Akzentfarbe für wissenschaftlichen Frame */
            margin-bottom: 8px;
            display: inline-block;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .product-subtitle {
            font-size: 0.9rem;
            font-weight: 400;
            color: #d9d9d9;
            margin-bottom: 16px;
        }

        /* Preis & Action-Button Reihe */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .price-tag {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
        }

        .price-tag span {
            font-size: 0.8rem;
            font-weight: 400;
            color: #888888;
            margin-left: 2px;
        }

        /* Checkout-Button */
        .checkout-btn {
            background-color: #ff7517;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background-color 0.2s ease, transform 0.1s ease;
            white-space: nowrap;
        }

        .checkout-btn:hover {
            background-color: #e0600f;
        }

        .checkout-btn:active {
            transform: scale(0.97);
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 768px) {
            body {
                padding-top: 40px;
            }
            h1 {
                font-size: 1.8rem;
                white-space: normal;
            }
            p.subline {
                font-size: 0.9rem;
                white-space: normal;
                margin-top: 8px;
            }
            .product-card {
                max-width: 100%; /* Kachel passt sich auf dem Handy vollflächig an */
            }
        }
    </style>
</head>
<body>

    <!-- Header Bereich -->
    <div class="header-container">
        <h1>NEUROLAB | NEURONAL NETWORK</h1>
        <p class="subline">Neuropsychologie & Muster</p>
    </div>

    <!-- App-Store Style Produkt-Kachel -->
    <div class="product-card">
        <div class="card-image-wrapper">
            <!-- Das Cover-Bild deiner Analyse -->
            <img src="Preview_slide3.jpg" alt="Rausch oder Realität? Analyse" class="card-image">
        </div>
        <div class="card-content">
            <span class="tag">Wissenschaftliche Analyse</span>
            <h2 class="product-title">Rausch oder Realität?</h2>
            <p class="product-subtitle">Warum Substanzen dein Verhalten verändern</p>
            
            <div class="card-footer">
                <div class="price-tag">15,00<span>€</span></div>
                <!-- Direkter Checkout Link -->
                <a href="https://zugang.neuronalnetwork.de/checkout/buy/3bf34f1a-b531-4855-8c97-6c0456f51a7d" class="checkout-btn">Analyse freischalten</a>
            </div>
        </div>
    </div>

</body>
</html>
