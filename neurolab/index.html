<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROLAB | Neuronal Network</title>
    <!-- Standard Clean Sans-Serif (Inter is clean, timeless, and standard) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #F5F5F5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 24px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        /* Clean, standard uppercase headline on a single line */
        h1 {
            font-size: 3.5vw; /* Fluid scaling to keep it on one line */
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #ff7517;
            line-height: 1.2;
            white-space: nowrap;
        }

        /* Standard clean subline in the requested d9d9d9 grey */
        p.subline {
            font-size: 1.5vw;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #d9d9d9;
            text-transform: uppercase;
            margin-top: 12px;
            white-space: nowrap;
        }

        /* Responsive adjustments for mobile viewports */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                white-space: normal; /* Allow wrapping on mobile so it doesn't clip */
            }
            p.subline {
                font-size: 0.9rem;
                white-space: normal;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NEUROLAB | NEURONAL NETWORK</h1>
        <p class="subline">Neuropsychologie & Muster</p>
    </div>

</body>
</html>
